{% extends "pages/layout.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-gold-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="flex justify-center mb-8">
            <a href="/" class="flex items-center gap-2.5 no-underline">
                <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center shadow-md">
                    <i class="fa fa-graduation-cap text-lg text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-secondary-900">Project<span class="text-primary">Hub</span></h1>
            </a>
        </div>

        <div class="bg-white rounded-2xl border border-secondary-200 shadow-sm p-8">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-accent-success/10 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-key text-accent-success text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-secondary-900 mb-1">Reset Your Password</h2>
                <p class="text-secondary text-sm">Enter a new password for your account.</p>
            </div>

            <form method="post" action="/auth/reset-password" class="space-y-5">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="space-y-1.5">
                    <label class="text-secondary-700 text-sm font-medium" for="rp-password">New Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-secondary-400 text-sm"></i>
                        <input type="password" id="rp-password" name="password" class="w-full bg-white border border-secondary-300 rounded-lg pl-10 pr-10 py-2.5 text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-secondary-400 text-sm" required minlength="8" placeholder="Min. 8 characters" autocomplete="new-password">
                        <button type="button" class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-secondary-500 hover:text-secondary-700" data-target="rp-password" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-secondary-700 text-sm font-medium" for="rp-confirm-password">Confirm New Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-secondary-400 text-sm"></i>
                        <input type="password" id="rp-confirm-password" name="confirm_password" class="w-full bg-white border border-secondary-300 rounded-lg pl-10 pr-10 py-2.5 text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-secondary-400 text-sm" required minlength="8" placeholder="Repeat your password" autocomplete="new-password">
                        <button type="button" class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-secondary-500 hover:text-secondary-700" data-target="rp-confirm-password" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full py-3 text-sm">
                    Reset Password <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="/auth?mode=login" class="text-secondary-400 hover:text-secondary-600 text-sm">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to Sign In
            </a>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('.password-toggle').forEach((toggle) => {
    toggle.addEventListener('click', () => {
        const input = document.getElementById(toggle.dataset.target);
        if (!input) return;
        const icon = toggle.querySelector('i');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('fa-eye', !isPassword);
        icon.classList.toggle('fa-eye-slash', isPassword);
    });
});
</script>
{% endblock %}
