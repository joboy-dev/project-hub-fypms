{% extends "pages/layout.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-gold-50 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="flex justify-center mb-8">
            <a href="/" class="flex items-center gap-2.5 no-underline">
                <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center shadow-md">
                    <i class="fa fa-graduation-cap text-lg text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-secondary-900">Project<span class="text-primary">Hub</span></h1>
            </a>
        </div>

        <div class="bg-white rounded-2xl border border-secondary-200 shadow-sm p-8">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-lock-open text-primary text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-secondary-900 mb-1">Forgot Password?</h2>
                <p class="text-secondary text-sm">Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form method="post" action="/auth/forgot-password" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-secondary-700 text-sm font-medium" for="fp-email">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-secondary-400 text-sm"></i>
                        <input type="email" id="fp-email" name="email" class="w-full bg-white border border-secondary-300 rounded-lg pl-10 pr-4 py-2.5 text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-secondary-400 text-sm" required placeholder="email@university.edu" autocomplete="email">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full py-3 text-sm">
                    Send Reset Link <i class="fa-solid fa-paper-plane ml-2"></i>
                </button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="/auth?mode=login" class="text-secondary-400 hover:text-secondary-600 text-sm">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
