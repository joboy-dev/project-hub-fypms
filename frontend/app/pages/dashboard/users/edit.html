{% extends "pages/dashboard/layout.html" %}

{% block dashboard_content %}

<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="/dashboard/users/{{ target_user.id }}" class="text-sm text-secondary-400 hover:text-secondary-700">
            <i class="fa-solid fa-arrow-left mr-1"></i> Back to User
        </a>
    </div>

    <div class="card">
        <h2 class="text-xl font-bold text-secondary-900 mb-6">Edit User</h2>

        <form method="post" action="/dashboard/users/{{ target_user.id }}/edit" class="space-y-5">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-secondary-700" for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" required value="{{ target_user.first_name }}"
                           class="w-full bg-white border border-secondary-300 rounded-lg px-4 py-2.5 text-sm text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-secondary-400">
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-secondary-700" for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required value="{{ target_user.last_name }}"
                           class="w-full bg-white border border-secondary-300 rounded-lg px-4 py-2.5 text-sm text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-secondary-400">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-sm font-medium text-secondary-700">Email</label>
                <input type="email" value="{{ target_user.email }}" disabled
                       class="w-full bg-secondary-50 border border-secondary-200 rounded-lg px-4 py-2.5 text-sm text-secondary-400 cursor-not-allowed">
                <p class="text-xs text-secondary-400">Email cannot be changed</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-secondary-700" for="role">Role</label>
                    <select id="role" name="role"
                            class="w-full bg-white border border-secondary-300 rounded-lg px-4 py-2.5 text-sm text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                        {% for r in role_choices %}
                        <option value="{{ r }}" {{ 'selected' if r == target_user.role else '' }}>{{ r | title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-secondary-700" for="department_id">Department</label>
                    <select id="department_id" name="department_id"
                            class="w-full bg-white border border-secondary-300 rounded-lg px-4 py-2.5 text-sm text-secondary-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="">No department</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}" {{ 'selected' if dept.id == target_user.department_id else '' }}>{{ dept.name }} ({{ dept.code }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-3 py-2">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_active" value="on" class="sr-only peer" {{ 'checked' if target_user.is_active else '' }}>
                    <div class="w-11 h-6 bg-secondary-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-secondary-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    <span class="ml-3 text-sm font-medium text-secondary-700">Active account</span>
                </label>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-secondary-100">
                <a href="/dashboard/users/{{ target_user.id }}" class="btn text-sm text-secondary-600 hover:bg-secondary-100">Cancel</a>
                <button type="submit" class="btn btn-primary text-sm">
                    <i class="fa-solid fa-check mr-2"></i> Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
