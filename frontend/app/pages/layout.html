<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', path='images/favicon.ico') }}" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" 
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" 
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
      @theme {
        /* Primary Colors (Royal Blue) */
        --color-primary-50: #eff6ff;
        --color-primary-100: #dbeafe;
        --color-primary-200: #bfdbfe;
        --color-primary-300: #93c5fd;
        --color-primary-400: #60a5fa;
        --color-primary: #2563eb;
        --color-primary-600: #1d4ed8;
        --color-primary-700: #1e40af;
        --color-primary-800: #1e3a8a;
        --color-primary-900: #172554;
      
        /* Secondary Colors (Slate - for light mode) */
        --color-secondary-50: #f8fafc;
        --color-secondary-100: #f1f5f9;
        --color-secondary-200: #e2e8f0;
        --color-secondary-300: #cbd5e1;
        --color-secondary-400: #94a3b8;
        --color-secondary: #64748b;
        --color-secondary-600: #475569;
        --color-secondary-700: #334155;
        --color-secondary-800: #1e293b;
        --color-secondary-900: #0f172a;
        --color-secondary-950: #020617;

        /* Gold Accent */
        --color-gold-50: #fffbeb;
        --color-gold-100: #fef3c7;
        --color-gold-200: #fde68a;
        --color-gold-300: #fcd34d;
        --color-gold-400: #fbbf24;
        --color-gold: #f59e0b;
        --color-gold-600: #d97706;
        --color-gold-700: #b45309;
        --color-gold-800: #92400e;
        --color-gold-900: #78350f;
      
        /* Accent Colors */
        --color-accent-success-400: #34d399;
        --color-accent-success: #10b981;
        --color-accent-success-600: #059669;
      
        --color-accent-warning-400: #fbbf24;
        --color-accent-warning: #f59e0b;
        --color-accent-warning-600: #d97706;
      
        --color-accent-error-400: #f87171;
        --color-accent-error: #ef4444;
        --color-accent-error-600: #dc2626;
      
        --color-accent-info-400: #60a5fa;
        --color-accent-info: #3b82f6;
        --color-accent-info-600: #2563eb;

        @keyframes pulse-slow {
          50% {
            opacity: 0.5;
          }
        }
      
        @keyframes glow {
          0% {
            box-shadow: 0 0 5px rgba(37, 99, 235, 0.3);
          }
          100% {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
          }
        }
      
        --animate-pulse-slow: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        --animate-glow: glow 2s ease-in-out infinite alternate;
      }

      html,
      body {
        max-width: 100vw;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #ffffff;
        color: #1e293b;
        scroll-behavior: smooth;
      }

      * {
        box-sizing: border-box;
        transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow,
          transform, filter, backdrop-filter;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 150ms;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        @apply bg-secondary-100;
      }

      ::-webkit-scrollbar-thumb {
        @apply bg-primary-400 rounded-full;
      }

      ::-webkit-scrollbar-thumb:hover {
        @apply bg-primary;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeInLeft {
        from { opacity: 0; transform: translateX(-30px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes countUp {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
      }

      .animate-float { animation: float 3s ease-in-out infinite; }
      .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
      .animate-fade-in-left { animation: fadeInLeft 0.6s ease-out forwards; }
      .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
      .animate-count-up { animation: countUp 0.5s ease-out forwards; }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }

      .page-padding {
        @apply max-md:px-6 max-sm:px-4 px-[80px] pt-24 pb-10;
      }

      .nav-padding {
        @apply px-6 md:px-[80px] py-4;
      }

      .btn {
        @apply px-5 py-2.5 rounded-lg font-semibold text-center cursor-pointer;
      }

      .btn-primary {
        @apply bg-primary text-white hover:bg-primary-700 shadow-md hover:shadow-lg;
      }

      .btn-outline {
        @apply bg-transparent text-primary border-2 border-primary hover:bg-primary hover:text-white;
      }

      .btn-gold {
        @apply bg-gold text-white hover:bg-gold-600 shadow-md hover:shadow-lg;
      }

      .card {
        @apply bg-white rounded-xl border border-secondary-200 shadow-sm hover:shadow-md p-6;
      }

      .section-title {
        @apply text-3xl md:text-4xl font-bold text-secondary-900;
      }

      .section-subtitle {
        @apply text-lg text-secondary max-w-2xl mx-auto;
      }

      /* Scroll reveal */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.6s ease-out;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
</head>

<body class="relative bg-white">
    {% include "components/flash_message.html" %}

    <div id="modal-overlay" class="fixed inset-0 bg-secondary-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
      <div id="modal" class="bg-white rounded-2xl shadow-2xl p-8 w-[60%] max-md:w-[95%] border border-secondary-200 relative animate-slide-down">
        <button id="modal-close" class="absolute top-4 right-4 text-secondary-400 hover:text-secondary-900 text-2xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-secondary-100">
          &times;
        </button>
        <div id="modal-body">
          {% block modal_content %} {% endblock %}
        </div>
      </div>
    </div>
    <script>
      function openModal(contentHtml) {
        document.getElementById('modal-overlay').classList.remove('hidden');
      }
      function closeModal() {
        document.getElementById('modal-overlay').classList.add('hidden');
      }
      document.getElementById('modal-close').onclick = closeModal;
      document.getElementById('modal-overlay').onclick = function(e) {
        if (e.target === this) closeModal();
      };

      // Scroll reveal observer
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
      });
    </script>

    {% block content %} {% endblock %}
</body>
</html>
