{% extends "pages/layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-red-50 via-white to-gold-50 px-4">
    <div class="text-center max-w-lg">
        <!-- Animated illustration -->
        <div class="relative mb-8">
            <div class="text-[10rem] font-black text-red-100 leading-none select-none">500</div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-28 h-28 bg-white rounded-full shadow-xl flex items-center justify-center animate-float">
                    <i class="fa-solid fa-screwdriver-wrench text-5xl text-accent-error"></i>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-secondary-900 mb-3">Something Went Wrong</h1>
        <p class="text-secondary mb-4 text-lg leading-relaxed">
            We encountered an unexpected error while processing your request.
        </p>
        <p class="text-secondary-400 mb-8 text-sm">
            Our team has been notified and is working to resolve the issue.
        </p>

        <div class="flex items-center justify-center gap-4">
            <a href="/" class="btn btn-primary px-8">
                <i class="fa-solid fa-house mr-2"></i> Go Home
            </a>
            <button onclick="location.reload()" class="btn btn-outline px-8 cursor-pointer">
                <i class="fa-solid fa-rotate-right mr-2"></i> Try Again
            </button>
        </div>
    </div>
</div>
{% endblock %}
