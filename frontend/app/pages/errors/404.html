{% extends "pages/layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-primary-50 via-white to-gold-50 px-4">
    <div class="text-center max-w-lg">
        <!-- Animated illustration -->
        <div class="relative mb-8">
            <div class="text-[10rem] font-black text-primary-100 leading-none select-none">404</div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-28 h-28 bg-white rounded-full shadow-xl flex items-center justify-center animate-float">
                    <i class="fa-solid fa-compass text-5xl text-primary"></i>
                </div>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-secondary-900 mb-3">Page Not Found</h1>
        <p class="text-secondary mb-8 text-lg leading-relaxed">
            The page you're looking for seems to have wandered off. <br class="hidden sm:inline">
            Don't worry, let's get you back on track.
        </p>

        <div class="flex items-center justify-center gap-4">
            <a href="/" class="btn btn-primary px-8">
                <i class="fa-solid fa-house mr-2"></i> Go Home
            </a>
            <button onclick="history.back()" class="btn btn-outline px-8 cursor-pointer">
                <i class="fa-solid fa-arrow-left mr-2"></i> Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
