    <!-- Mobile Nav -->
    <div class="mobile-nav w-full bg-white border-t border-secondary-200 z-50 flex flex-col items-start justify-start gap-2 hidden md:hidden absolute left-0 top-full shadow-lg">
        <div class="p-6 flex flex-col gap-3 w-full">

            <a href="/"

<script>
document.addEventListener("DOMContentLoaded", function() {
    const hamburger = document.querySelector('.hamburger');
    const cancel = document.querySelector('.cancel');
    const mobileNav = document.querySelector('.mobile-nav');

    function showMenu() {
        mobileNav.classList.remove('hidden');
        hamburger.classList.add('hidden');
        cancel.classList.remove('hidden');
    }

    function hideMenu() {
        mobileNav.classList.add('hidden');
        hamburger.classList.remove('hidden');
        cancel.classList.add('hidden');
    }

    hamburger.addEventListener('click', showMenu);
    cancel.addEventListener('click', hideMenu);

    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            hideMenu();
        }
    });

    // Close mobile nav when clicking a link
    mobileNav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', hideMenu);
    });
});
</script>
